<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pavel pivarshev</title>
    <link rel="icon" href="icon.png">
    <style>
        * { margin: 0; padding: 0; }
        body {
            background: #eee;
            cursor: pointer;
            min-height: 100vh;
            font-family: serif;
        }
        .fit {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .fit img {
            max-width: 95vw;
            max-height: 95vh;
            cursor: zoom-in;
        }
        .full img {
            cursor: zoom-out;
        }
        #back-label {
            position: fixed;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 2.5vw;
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            pointer-events: none;
            user-select: none;
        }
        body.zoomed #back-label {
            display: none;
        }
    </style>
</head>
<body>
    <div id="back-label">&lt;&lt;&lt;</div>
    <div id="wrap" class="fit">
        <img id="artwork" src="" alt="">
    </div>
    <script>
        var params = new URLSearchParams(window.location.search);
        var src = params.get('img');
        var img = document.getElementById('artwork');
        var wrap = document.getElementById('wrap');
        if (src) img.src = src;

        var zoomed = false;

        img.addEventListener('click', function (e) {
            e.stopPropagation();

            if (!zoomed) {
                // Calculate where on the image was clicked (0-1)
                var rect = img.getBoundingClientRect();
                var pctX = (e.clientX - rect.left) / rect.width;
                var pctY = (e.clientY - rect.top) / rect.height;

                // Switch to full size
                wrap.className = 'full';
                document.body.classList.add('zoomed');
                zoomed = true;

                // After layout updates, scroll to the clicked spot
                requestAnimationFrame(function () {
                    var targetX = (img.naturalWidth * pctX) - (window.innerWidth / 2);
                    var targetY = (img.naturalHeight * pctY) - (window.innerHeight / 2);
                    window.scrollTo(targetX, targetY);
                });
            } else {
                // Zoom out
                wrap.className = 'fit';
                document.body.classList.remove('zoomed');
                zoomed = false;
                window.scrollTo(0, 0);
            }
        });

        // Click outside image = go back
        document.body.addEventListener('click', function (e) {
            if (e.target.tagName !== 'IMG') {
                history.back();
            }
        });
    </script>
</body>
</html>
