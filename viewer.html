<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pavel pivarshev</title>
    <link rel="icon" href="icon.png">
    <style>
        body {
            margin: 0;
            background: #eee;
            min-height: 100vh;
            cursor: pointer;
            overflow: auto;
            display: block;
            text-align: center;
        }
        body::before {
            content: '';
            display: inline-block;
            height: 100vh;
            vertical-align: middle;
        }
        img {
            max-width: 95vw;
            max-height: 95vh;
            object-fit: contain;
            cursor: zoom-in;
            vertical-align: middle;
        }
        img.zoomed {
            max-width: none;
            max-height: none;
            cursor: zoom-out;
        }
    </style>
</head>
<body>
    <img id="artwork" src="" alt="">
    <script>
        var params = new URLSearchParams(window.location.search);
        var src = params.get('img');
        var img = document.getElementById('artwork');
        if (src) {
            img.src = src;
        }

        // Click image = toggle zoom, centering on click point
        img.addEventListener('click', function (e) {
            e.stopPropagation();
            var wasZoomed = img.classList.contains('zoomed');
            img.classList.toggle('zoomed');

            if (!wasZoomed) {
                // Zooming in: scroll to the clicked spot
                var rect = img.getBoundingClientRect();
                var clickX = (e.clientX - rect.left) / rect.width;
                var clickY = (e.clientY - rect.top) / rect.height;

                requestAnimationFrame(function () {
                    var scrollX = (img.offsetWidth * clickX) - (window.innerWidth / 2);
                    var scrollY = (img.offsetHeight * clickY) - (window.innerHeight / 2);
                    window.scrollTo(scrollX, scrollY);
                });
            } else {
                // Zooming out: reset scroll
                window.scrollTo(0, 0);
            }
        });

        // Click outside image = go back
        document.body.addEventListener('click', function (e) {
            if (e.target.tagName !== 'IMG') {
                history.back();
            }
        });
    </script>
</body>
</html>
